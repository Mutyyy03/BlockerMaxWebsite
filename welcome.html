<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="canonical" href="https://blockermax.com/" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-10931560670"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'AW-10931560670');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockerMax — Choose your experience</title>
    <meta name="description" content="BlockerMax — choose your path: Parental Control to protect your family, or quit your own addiction with science-based blocking.">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            overflow: hidden;
        }

        .split {
            display: flex;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }

        .half {
            position: relative;
            flex: 1;
            overflow: hidden;
            text-decoration: none;
            cursor: pointer;
            transition: flex 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .half video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.08);
            filter: blur(5px) brightness(0.5);
            transition: filter 0.6s ease, transform 0.6s ease;
        }

        .half .scrim {
            position: absolute;
            inset: 0;
            background: rgba(10, 14, 25, 0.35);
            transition: background 0.5s ease;
            z-index: 1;
        }

        .half .label {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            color: #fff;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .half .label .app-icon {
            width: 62px;
            height: 62px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 18px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
        }

        .half .label h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: clamp(1.7rem, 3.4vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            text-shadow: 0 2px 30px rgba(0, 0, 0, 0.55);
        }

        .half .label .enter {
            margin-top: 18px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 10px 22px;
            border-radius: 999px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            background: rgba(255, 255, 255, 0.08);
        }

        /* hover (desktop): grow + clear */
        @media (hover: hover) {
            .split:hover .half { flex: 0.7; }
            .split:hover .half:hover { flex: 1.7; }
            .half:hover video { filter: blur(0) brightness(0.78); transform: scale(1); }
            .half:hover .scrim { background: rgba(10, 14, 25, 0.18); }
            .half:hover .label { transform: scale(1.06); }
            .half:hover .label .enter { opacity: 1; transform: translateY(0); }
        }

        /* mobile: stack top/bottom, no hover */
        @media (max-width: 760px), (hover: none) {
            .split { flex-direction: column; }
            .half { flex: 1 !important; }
            .half video { filter: blur(2px) brightness(0.55); transform: scale(1.04); }
            .half .label .enter { opacity: 1; transform: none; }
            .half .label h2 { font-size: clamp(1.6rem, 7vw, 2.4rem); }
        }
    </style>
</head>

<body>
    <main class="split">
        <!-- Parental Control -->
        <a class="half" href="parental-control.html" aria-label="Parental Control">
            <video autoplay muted loop playsinline preload="auto">
                <source src="Parental%20Home%20Images/main.mp4" type="video/mp4">
            </video>
            <div class="scrim"></div>
            <div class="label">
                <img class="app-icon" src="Parental%20Control%20AppIcon-opt.png" alt="Parental Control app icon">
                <h2 data-en="Parental Control" data-tr="Ebeveyn Kontrolü">Parental Control</h2>
                <span class="enter">
                    <span data-en="Protect your family" data-tr="Ailenizi koruyun">Protect your family</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </span>
            </div>
        </a>

        <!-- Quit Your Addiction -->
        <a class="half" href="landing.html" aria-label="Quit Your Addiction">
            <video autoplay muted loop playsinline preload="auto" src="sun.mp4"></video>
            <div class="scrim"></div>
            <div class="label">
                <img class="app-icon" src="logo.png" alt="BlockerMax app icon">
                <h2 data-en="Quit Your Addiction" data-tr="Bağımlılığını Yen">Quit Your Addiction</h2>
                <span class="enter">
                    <span data-en="Take back control" data-tr="Kontrolü geri al">Take back control</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </span>
            </div>
        </a>
    </main>

    <script>
        (function () {
            var saved = null;
            try { saved = localStorage.getItem('bm-lang'); } catch (e) {}
            var lang = saved || ((navigator.language || 'en').toLowerCase().indexOf('tr') === 0 ? 'tr' : 'en');
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-en]').forEach(function (el) {
                var t = el.getAttribute('data-' + lang);
                if (t !== null) el.textContent = t;
            });
        })();
    </script>
</body>

</html>
