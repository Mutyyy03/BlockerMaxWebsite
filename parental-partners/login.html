<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_title">Login - BlockerMax Partner Program</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="translations.js"></script>
</head>
<body>
    <div class="lang-switcher" style="position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; align-items: center; background: rgba(0,0,0,0.03); padding: 6px 12px; border-radius: 20px; z-index: 100;">
        <button class="lang-btn" data-lang="en" onclick="setLanguage('en')" style="background: none; border: none; font-weight: 700; color: var(--text-muted); cursor: pointer; padding: 2px; font-size: 13px; -webkit-tap-highlight-color: transparent;">EN</button>
        <span style="color: var(--border-color); font-size: 13px;">|</span>
        <button class="lang-btn" data-lang="tr" onclick="setLanguage('tr')" style="background: none; border: none; font-weight: 700; color: var(--text-muted); cursor: pointer; padding: 2px; font-size: 13px; -webkit-tap-highlight-color: transparent;">TR</button>
    </div>

    <div class="login-page" style="background-color: #FFFFFF;">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">
                    <img src="Parental Control AppIcon-opt.png" alt="BlockerMax" style="width: 56px; height: 56px; border-radius: 14px; object-fit: cover; display: block; margin: 0 auto 10px;">
                    <span>Parental Control : BlockerMax</span>
                </div>
                <p data-i18n="login_title">Partner Program Login</p>
            </div>
            
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label class="form-label" for="username" data-i18n="login_username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="john.doe" required data-i18n="[placeholder]login_username">
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label" for="password" data-i18n="login_password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required data-i18n="[placeholder]login_password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" data-i18n="login_submit">Sign In</button>
            </form>
            
            <div class="text-center mt-4">
                <p style="font-size: 13px;" data-i18n="login_no_account">Don't have an account? <a href="index.html#apply">Apply now</a></p>
            </div>
        </div>
    </div>

    <!-- Simple Footer for Login Page -->
    <div style="text-align: center; padding: 40px 20px; border-top: 1px solid #eee; margin-top: auto;">
        <div style="display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;">
            <a href="affiliate-terms.html" style="font-size: 13px; color: #6E6E73;" data-i18n="footer_terms">Affiliate Terms</a>
            <a href="https://blockermax.com/privacy-policy.html" style="font-size: 13px; color: #6E6E73;" data-i18n="footer_policy">Privacy Policy</a>
            <a href="https://blockermax.com/support.html" style="font-size: 13px; color: #6E6E73;" data-i18n="footer_contact">Contact</a>
        </div>
        <p style="margin-top: 15px; font-size: 12px; color: #6E6E73;" data-i18n="footer_copy">© 2026 BlockerMax. All rights reserved.</p>
    </div>
    <script src="login.js"></script>
</body>
</html>
