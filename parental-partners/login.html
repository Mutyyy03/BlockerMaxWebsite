<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BlockerMax Partner Program</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        h1, h2, h3, .login-logo span { font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; letter-spacing: -0.02em; }
    </style>
</head>
<body>
    <div class="login-page" style="background-color: #FFFFFF;">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">
                    <img src="Parental Control AppIcon-opt.png" alt="BlockerMax" style="width: 44px; height: 44px; border-radius: 12px; object-fit: cover; display: block;">
                    <span><b>Parental Control</b>: BlockerMax</span>
                </div>
                <p>Partner Program Login</p>
            </div>
            
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="john.doe" required>
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
            
            <div class="text-center mt-4">
                <p style="font-size: 13px;">Don't have an account? <a href="index.html#apply">Apply now</a></p>
            </div>
        </div>
    </div>

    <!-- Simple Footer for Login Page -->
    <div style="text-align: center; padding: 40px 20px; border-top: 1px solid #eee; margin-top: auto;">
        <div style="display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;">
            <a href="affiliate-terms.html" style="font-size: 13px; color: #6E6E73;">Affiliate Terms</a>
            <a href="https://blockermax.com/privacy-policy.html" style="font-size: 13px; color: #6E6E73;">Privacy Policy</a>
            <a href="https://blockermax.com/support.html" style="font-size: 13px; color: #6E6E73;">Contact</a>
        </div>
        <p style="margin-top: 15px; font-size: 12px; color: #6E6E73;">© 2026 BlockerMax. All rights reserved.</p>
    </div>
    <script src="login.js"></script>
</body>
</html>
