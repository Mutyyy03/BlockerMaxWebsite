<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BlockerMax Partner Program</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-page" style="background-color: #FFFFFF;">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">
                    <img src="logo.png" alt="BlockerMax" style="width: 56px; height: 56px; border-radius: 14px; object-fit: cover; display: block; margin: 0 auto 10px;">
                    BlockerMax
                </div>
                <p>Partner Program Login</p>
            </div>
            
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="john.doe" required>
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
            
            <div class="text-center mt-4">
                <p style="font-size: 13px;">Don't have an account? <a href="index.html">Apply now</a></p>
            </div>
        </div>
    </div>
</body>
</html>
